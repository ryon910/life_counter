name: life_counter
description: "人生は有限だから、1日を大切に生きてほしい。"
publish_to: 'none'
version: 1.0.1+4

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  shared_preferences: ^2.3.4
  go_router: ^14.8.1
  fl_chart: ^0.70.2
  flutter_local_notifications: ^18.0.1
  table_calendar: ^3.2.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  timezone: ^0.10.1
  url_launcher: ^6.3.1
  in_app_review: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/legal/
